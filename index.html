<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para ti</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- GSAP -->
<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>
</head>

<body>

<main>

  <section class="hero">
    <h1>Hay cosas que no se dicen.<br>Se sienten.</h1>
  </section>

  <section class="decision decision-1">
    <div class="image image-a"></div>
    <div class="text">
      <p>Desde el primer momento supe que contigo no iba a ser simple.</p>
      <div class="choices">
        <button data-choice="close">Acercarme</button>
        <button data-choice="tease">Provocarte</button>
      </div>
    </div>
  </section>

  <section class="transition">
    <div class="image image-b"></div>
    <p>Hay miradas que prometen cosas que no se pueden deshacer.</p>
  </section>

  <section class="decision decision-2">
    <div class="image image-c"></div>
    <div class="choices">
      <button data-choice="continue">Seguir</button>
      <button data-choice="wait">Esperar un poco más</button>
    </div>
  </section>

  <section class="climax">
    <p class="promise">Quiero elegirte sin miedo, con deseo y con intención.</p>
    <p class="question">¿Te atreves a seguir escribiendo esto conmigo?</p>
    <div class="choices">
      <button>Sí</button>
      <button>Claro que sí</button>
    </div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
